name: tag-release

# Tags every push to main with the version in pyMEP.extension/version.txt
# (v0.x scheme). Dev environments can't push tags directly (the git proxy
# blocks refs/tags), so this runs server-side instead.
#
# Also manually dispatchable to (re)tag any commit:
#   Actions > tag-release > Run workflow  (tag + sha inputs, both optional).
#
# The GitHub Tags page always sorts by tag CREATION date (no name sort),
# so retroactive tags are backdated via the 'date' input to keep the page
# in version order; 'force' replaces an existing tag (fix a date/target).

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name (blank = read pyMEP.extension/version.txt)"
        required: false
        default: ""
      sha:
        description: "Commit SHA to tag (blank = current head)"
        required: false
        default: ""
      date:
        description: "Tagger date: ISO 8601, or 'commit' = the target commit's date (blank = now)"
        required: false
        default: ""
      force:
        description: "Set 'true' to replace the tag if it already exists"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push the tag
        env:
          IN_TAG: ${{ github.event.inputs.tag }}
          IN_SHA: ${{ github.event.inputs.sha }}
          IN_DATE: ${{ github.event.inputs.date }}
          IN_FORCE: ${{ github.event.inputs.force }}
        run: |
          set -e
          TARGET="${IN_SHA:-$GITHUB_SHA}"
          VER="$IN_TAG"
          if [ -z "$VER" ]; then
            VER=$(git show "$TARGET:pyMEP.extension/version.txt" | tr -d ' \r\n')
          fi
          if [ -z "$VER" ]; then
            echo "No version found - nothing to tag."
            exit 0
          fi
          PUSH_ARGS=""
          if git rev-parse -q --verify "refs/tags/$VER" >/dev/null; then
            if [ "$IN_FORCE" != "true" ]; then
              echo "Tag $VER already exists - nothing to do."
              exit 0
            fi
            git tag -d "$VER"
            PUSH_ARGS="--force"
          fi
          TAG_DATE="$IN_DATE"
          if [ "$TAG_DATE" = "commit" ]; then
            TAG_DATE=$(git show -s --format=%cI "$TARGET")
          fi
          if [ -n "$TAG_DATE" ]; then
            export GIT_COMMITTER_DATE="$TAG_DATE"
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$VER" -m "pyMEP $VER" "$TARGET"
          git push $PUSH_ARGS origin "refs/tags/$VER"
          echo "Tagged $TARGET as $VER (date: ${TAG_DATE:-now})"
