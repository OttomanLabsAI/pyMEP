title: "Merge\nPipes"
tooltip: "Collapse selected straight runs of pipe into single pipes. Select the pipes of a run (couplings between them can be left unselected) and click: every collinear set is replaced by one pipe spanning the run's two extreme endpoints at their EXACT XYZ, the originals and their internal couplings are deleted, and the fittings where the run meets the rest of the model are reconnected to the new pipe. The new pipe takes the longest segment's type, system, level, workset and Mark; diameter is the run's largest when sizes are mixed (reported). Pipes that line up with nothing are left alone."
