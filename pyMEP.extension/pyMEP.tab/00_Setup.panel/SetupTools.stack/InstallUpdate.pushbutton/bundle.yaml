title: Install Update
tooltip: >-
  Downloads the newest published pyMEP.extension from GitHub (latest release,
  else newest tag, else the default branch) and installs it in one go. The
  previous version's folder is removed after a successful install (any
  version can be reinstalled from Settings > General > Downgrade /
  reinstall); a failed install restores it automatically. Configure
  'github_repo' / 'github_token' in pyMEP_settings.json if needed.
