title: "Import\nPipe Types"
tooltip: "Pick another Revit file and copy its pipe types straight into this model - routing preferences, segments, schedules, materials and fitting families come along (same mechanism as Transfer Project Standards, without opening the file in your session). The source is opened invisibly in the background, detached if workshared, and closed without saving. Existing types are kept, never overwritten or duplicated. Works for same-version files and older files; a file from a NEWER Revit cannot be opened - use Export Pipe Types' JSON for that direction."
