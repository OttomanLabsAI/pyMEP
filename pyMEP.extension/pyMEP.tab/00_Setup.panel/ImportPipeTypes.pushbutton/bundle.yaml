title: "Import\nMEP Types"
tooltip: "Pick another Revit file and copy its MEP types straight into this model, choosing which ones from each category present - pipe types, piping system types, pipe segments, duct types, duct system types, cable tray types, conduit types. Each type's dependents (routing preferences, segments, schedules, materials, fitting families) come along, same mechanism as Transfer Project Standards, without opening the file in your session. The source is opened invisibly in the background, detached if workshared, and closed without saving. Existing types are kept, never overwritten or duplicated. Works for same-version files and older files; a file from a NEWER Revit cannot be opened by Revit at all."
