title: "Export\nPipe Types"
tooltip: "Dump the model's pipe type definitions to a versioned JSON: routing preferences (segments, elbows, junctions, crosses, transitions, unions, flanges, caps, mechanical joints), the referenced pipe segments with roughness, schedule, material and full size catalogues, and every referenced fitting family/type. Everything by stable name - no ElementIds - with lengths in mm, so a companion Import Pipe Types button can rebuild the types in another model or an older Revit. Optionally also saves the fitting families as .rfa (same-version/upward reuse only)."
