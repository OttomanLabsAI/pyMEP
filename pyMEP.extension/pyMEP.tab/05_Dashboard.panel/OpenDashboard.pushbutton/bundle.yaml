title: |-
  Open
  Dashboard
tooltip: >-
  Opens the utilities 3D dashboard in your default browser. The dashboard
  loads a LandXML export, renders the buried-utilities networks in 3D, and
  its EXPORT button writes the JSON files the Place Boxes / Place Cylinders /
  Place Pipes buttons consume. Uses the newest .html in the extension's
  dashboard folder (override with 'dashboard_html_path' in
  pyMEP_settings.json). First load needs internet (three.js CDN).
