title: |-
  Dimension
  Section
tooltip: >-
  Open a chamber section view and click to auto-place dimensions and spot
  elevations on the visible ducts. Builds one chained linear dimension through
  all duct centrelines (the 300/300/300 spacing run) using the 'RHD_2.5'
  dimension type, plus a spot elevation on each duct using 'RHD_2.5_Project'.
  No selection needed - it dimensions everything visible in the section.
